<!DOCTYPE html>
<html>
<head>

<title>Study Plan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family:'Poppins',sans-serif;
    min-height:100vh;
}

/* Container */
.box{
    max-width:800px;
    margin:auto;
    margin-top:60px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Title */
h3{
    font-weight:600;
    color:#333;
}

/* Topic Cards */
.topic-card{
    padding:15px;
    border-radius:10px;
    margin-bottom:12px;
    background:#f8f9fa;
    border:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

.topic-card:hover{
    background:#eef2ff;
    transform:translateY(-2px);
}

/* Done status */
.done{
    color:green;
    font-weight:600;
    margin-left:8px;
}

/* Button */
.btn-start{
    font-size:13px;
    padding:6px 14px;
    border-radius:6px;
}

/* Back button */
.btn-secondary{
    border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h3 class="mb-3">📚 Your Study Topics</h3>

<hr>

{% for topic, status in topics %}

<div class="topic-card">

    <span>
        {{ topic }}

        {% if status == "done" %}
            <span class="done">✔️ Completed</span>
        {% endif %}
    </span>

    <a href="/learn/{{ topic }}" class="btn btn-primary btn-start">
        Start
    </a>

</div>

{% endfor %}

<a href="/notes" class="btn btn-secondary mt-3">← Back</a>

</div>

</body>
</html>
