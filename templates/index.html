<!DOCTYPE html>
<html>
<head>
<title>MindTrack AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌈 Background */
body{
    background: linear-gradient(120deg,#667eea,#764ba2);
    color:white;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔝 Navbar */
.navbar{
    background: transparent;
}

.navbar-brand{
    font-weight: bold;
    font-size: 22px;
}

/* 🚀 Hero */
.hero{
    margin-top:120px;
}

.hero h1{
    font-size: 50px;
    font-weight: bold;
}

.hero p{
    font-size: 18px;
    opacity: 0.9;
}

/* 🎯 Buttons */
.btn-custom{
    padding:10px 25px;
    border-radius:25px;
    margin:10px;
}

/* 📦 Features */
.features{
    margin-top:100px;
    background:white;
    color:black;
    padding:50px 20px;
    border-radius:20px 20px 0 0;
}

/* Cards */
.card{
    border:none;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Footer */
.footer{
    background:#222;
    padding:20px;
    margin-top:20px;
}

</style>

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar px-4">
    <span class="navbar-brand text-white">🧠 MindTrack AI</span>

    <div class="ms-auto">
        <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
    </div>
</nav>

<!-- 🚀 HERO -->
<div class="hero">

<h1>MindTrack AI 🧠</h1>
<p>Your Smart AI Learning Companion</p>

<a href="/register" class="btn btn-light btn-custom">Get Started</a>
<a href="/login" class="btn btn-outline-light btn-custom">Login</a>

</div>

<!-- 📦 FEATURES -->
<div class="features container">

<h2 class="mb-5">🚀 Features</h2>

<div class="row">

<div class="col-md-4 mb-4">
<div class="card p-4">
<h5>📚 Notes AI</h5>
<p>Upload notes and learn smarter.</p>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card p-4">
<h5>🤖 AI Tutor</h5>
<p>Ask doubts anytime with AI help.</p>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card p-4">
<h5>📝 Smart Quiz</h5>
<p>Test your knowledge instantly.</p>
</div>
</div>

</div>

</div>

<!-- 🔻 FOOTER -->
<div class="footer text-center">
<p>© 2026 MindTrack AI | Built with ❤️</p>
</div>

</body>
</html>
